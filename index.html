<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="author" content="MewmewDevArt">
	<!-- Additional metadata for accessibility and SEO -->
	<meta name="description" content="Minigames of Mewmew">
	<meta name="keywords" content="Kinect, web, HTML, CSS, JavaScript, minigame">
	<meta name="robots" content="index, follow">

	<link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
	<title>DoubleVision Game</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
	<link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
	<section class="game-screen">
		<div class="container-fluid">
		  <!-- Game Start Screen -->
		  <div id="game-start-screen">
			<!-- Eye container and animation -->
			<div class="eye-container">
			  <!-- Eye elements -->
			  <div class="eye">
				<!-- Pupil and iris animation -->
				<div class="eye-pupil upper-pupil"></div>
				<div class="eye-iris"></div>
				<div class="eye-pupil lower-pupil"></div>
			  </div>
			  <div class="eye">
				<!-- Pupil and iris animation -->
				<div class="eye-pupil upper-pupil"></div>
				<div class="eye-iris"></div>
				<div class="eye-pupil lower-pupil"></div>
			  </div>
			  <!-- Smile animation -->
			  <div class="smile smile--yay">
				<div class="smile-face">
				  <div class="smile-eyebrows"></div>
				  <div class="smile-mouth"></div>
				</div>
			  </div>
			</div>
			<!-- Heading and game box -->
			<h1>Tap any part of the screen to begin</h1>
			<div class="game-box start-box" id="imageDisplay"></div>
		  </div>
	
		  <!-- Gameplay Screen -->
		  <div id="gameplay-screen">
			<!-- Game UI -->
			<div class="gameUI">
				<div class="timer-design">
					<img src="./assets/images/ui_clock.png" alt="" srcset="">
					<div id="gameTimer">30</div>
				</div>
				<div class="score-design">
					<img src="./assets/images/ui_coint.png" alt="" srcset="">
					<div id="gameScore">00</div>
				</div>
			  <div class="gambiarra">0000</div>
			</div>
			
			<!-- Eye container and blocks -->
			<div class="eye-container">
			  <div class="eye">
				<div class="eyeLocal00">
				  <div class="block block_1"></div>
				  <div class="block block_2"></div>
				  <div class="block block_3"></div>
				</div>
			  </div>
			  <div class="eye">
				<div class="eyeLocal01">
				  <div class="block block_1"></div>
				  <div class="block block_2"></div>
				  <div class="block block_3"></div>
				</div>
			  </div>
			  <!-- Smile animation -->
			  <div class="smile smile--yay">
				<div class="smile-face">
				  <div class="smile-eyebrows"></div>
				  <div class="smile-mouth"></div>
				</div>
			  </div>
			</div>
		  </div>
	
		  <!-- Feedback Screens -->
		  <div class="feedback-screen">
			<!-- Tutorial Screen -->
			<div id="tutorial-screen">
			  <h2>Click on the repeating images!</h2>
			</div>
			<!-- Victory Screen -->
			<div id="victory-screen">
			  <h1 id="congratulationsMessage">Congratulations! You are a <strong>Perfectionist</strong></h1>
			  <div id="victoryScore">00</div>
			</div>
			<!-- Lose Screen -->
			<div id="lose-screen">
			  <h1>Oh no, you lost! Try again!</h1>
			</div>
		  </div>
		</div>
	  </section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<script src="./assets/js/code.js"></script>
</body>
</html>
